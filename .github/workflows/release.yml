name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*= *"\(.*\)"/\1/')
          echo "Tag version:     $TAG_VERSION"
          echo "pyproject.toml:  $TOML_VERSION"
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "❌ Version mismatch: tag v$TAG_VERSION != pyproject.toml $TOML_VERSION"
            exit 1
          fi
          echo "✅ Versions match"

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: experimental-features = nix-command flakes

      - name: Use Cachix cache
        uses: cachix/cachix-action@v15
        with:
          name: uup-builder-py-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build dist
        run: nix develop --command uv build

      - name: Check dist before release
        run: echo "Current dir:" && pwd && echo "Listing dist:" && ls -lah dist

      # -----------------------------------------------------------------------
      # TestPyPI — upload then validate before touching real PyPI
      # -----------------------------------------------------------------------

      - name: Validate TestPyPI install (wait until available)
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          nix develop --command uv venv --clear /tmp/validate-env
          

          for i in 1 2 3 4 5; do
            echo "Checking TestPyPI availability (attempt $i)"
            if nix develop --command uv pip install \
              --python /tmp/validate-env \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              --index-strategy unsafe-best-match \
              uup-builder==$TAG_VERSION; then
              /tmp/validate-env/bin/python -c "import uup_builder; print('✅ Import successful')"
              break
            fi
            if [ "$i" -lt 5 ]; then
              echo "Not available yet, waiting 20s..."
              sleep 20
            else
              echo "❌ Package never became available on TestPyPI"
              exit 1
            fi
          done


      # -----------------------------------------------------------------------
      # Real PyPI — only reached if TestPyPI upload + validation passed
      # -----------------------------------------------------------------------

      - name: Upload to PyPI (with retries)
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i to upload to PyPI"
            if nix develop --command uv publish; then
              echo "✅ PyPI upload succeeded"
              exit 0
            fi
            echo "❌ PyPI upload failed"
            if [ "$i" -lt 3 ]; then
              echo "Retrying in 20s..."
              sleep 20
            fi
          done
          echo "❌ PyPI upload failed after all retries"
          exit 1

      # -----------------------------------------------------------------------
      # GitHub Release
      # -----------------------------------------------------------------------

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz